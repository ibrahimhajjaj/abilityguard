name: Release zip

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build distributable zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Composer install (production)
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Build release zip
        run: bash scripts/build-release.sh

      - name: Resolve zip path
        id: zip
        run: |
          ZIP=$(ls dist/abilityguard-mcp-*.zip | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP" .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
