name: Release zip

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build distributable zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Composer install (production)
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Build admin bundle
        run: npm install && npm run build

      - name: Stage release tree
        run: |
          mkdir -p dist/abilityguard
          rsync -a \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.phpunit.cache' \
            --exclude='node_modules' \
            --exclude='lab' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='examples/.gitkeep' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='phpunit.xml.dist' \
            --exclude='phpunit-integration.xml.dist' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpcs.xml' \
            --exclude='phpstan.neon.dist' \
            --exclude='.wp-env.json' \
            --exclude='scripts' \
            --exclude='stubs' \
            --exclude='dist' \
            ./ dist/abilityguard/

      - name: Create zip
        working-directory: dist
        run: zip -rq abilityguard.zip abilityguard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: abilityguard-${{ github.ref_name }}
          path: dist/abilityguard.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/abilityguard.zip
