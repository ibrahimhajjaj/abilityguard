name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - name: Install
        run: composer install --prefer-dist --no-progress
      - name: PHPCS
        run: composer lint
      - name: PHPStan
        run: composer stan

  unit:
    name: Unit / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Install
        run: composer install --prefer-dist --no-progress
      - name: PHPUnit (unit)
        run: composer test

  integration:
    name: Integration / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wp: ["latest", "trunk"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - name: Composer install
        run: composer install --prefer-dist --no-progress
      - name: Build admin bundle
        run: npm install && npm run build
      - name: Install wp-env
        run: npm install -g @wordpress/env
      - name: Override core for matrix
        if: matrix.wp != 'latest'
        run: |
          node -e "const f=require('./.wp-env.json'); f.core='WordPress/WordPress#${{ matrix.wp }}'; require('fs').writeFileSync('.wp-env.json', JSON.stringify(f, null, 2));"
      - name: Start wp-env
        run: wp-env start
      - name: PHPUnit (integration)
        run: composer test:integration
      - name: Stop wp-env
        if: always()
        run: wp-env stop
